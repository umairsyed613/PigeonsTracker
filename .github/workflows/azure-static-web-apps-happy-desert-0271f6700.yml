name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
     - uses: actions/checkout@v4
       with:
          submodules: true
     - name: Setup .NET 10 SDK
       uses: actions/setup-dotnet@v4
       with:
         dotnet-version: "10.0.x"
     - name: Restore solution
       run: dotnet restore PigeonsTracker.sln
     - name: Publish Blazor app
       run: dotnet publish PigeonsTracker/PigeonsTracker.csproj -c Release -o PigeonsTracker/bin/Release/net10.0/publish
     - name: Publish Functions API
       run: dotnet publish PigeonsTrackerApi/PigeonsTrackerApi.csproj -c Release -o PigeonsTrackerApi/bin/Release/net10.0/publish
     - name: Build And Deploy
       id: builddeploy
       uses: Azure/static-web-apps-deploy@v1
       with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_DESERT_0271F6700 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "PigeonsTracker/bin/Release/net10.0/publish/wwwroot" # Built app output path
          api_location: "PigeonsTrackerApi/bin/Release/net10.0/publish" # Built API output path
          output_location: "" # Not used when app build is skipped
          skip_app_build: true
          skip_api_build: true
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_DESERT_0271F6700 }}
          action: "close"
